<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PPA-DUN Draft Kit API</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #0f1117;
      color: #e1e4e8;
      min-height: 100vh;
    }

    /* Nav */
    nav {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 16px 40px;
      border-bottom: 1px solid #21262d;
    }
    .logo { font-size: 20px; font-weight: 700; color: #58a6ff; }
    .nav-links a {
      color: #8b949e;
      text-decoration: none;
      margin-left: 24px;
      font-size: 14px;
    }
    .nav-links a:hover { color: #e1e4e8; }

    /* Hero */
    .hero {
      text-align: center;
      padding: 80px 20px 40px;
    }
    .hero h1 { font-size: 48px; margin-bottom: 16px; }
    .hero h1 span { color: #58a6ff; }
    .hero p { color: #8b949e; font-size: 18px; max-width: 500px; margin: 0 auto; }

    /* Main content */
    .container {
      max-width: 900px;
      margin: 0 auto;
      padding: 20px;
    }

    /* Tabs */
    .tabs {
      display: flex;
      gap: 4px;
      margin-bottom: 24px;
      border-bottom: 1px solid #21262d;
    }
    .tab {
      padding: 10px 20px;
      background: none;
      border: none;
      color: #8b949e;
      cursor: pointer;
      font-size: 14px;
      border-bottom: 2px solid transparent;
      transition: all 0.2s;
    }
    .tab:hover { color: #e1e4e8; }
    .tab.active { color: #58a6ff; border-bottom-color: #58a6ff; }

    /* Panels */
    .panel { display: none; }
    .panel.active { display: block; }

    /* Cards */
    .card {
      background: #161b22;
      border: 1px solid #21262d;
      border-radius: 8px;
      padding: 24px;
      margin-bottom: 16px;
    }
    .card h3 { margin-bottom: 12px; font-size: 16px; }
    .card p { color: #8b949e; font-size: 14px; line-height: 1.6; }

@media (max-width: 600px) {
      nav { padding: 16px 20px; }
      .hero h1 { font-size: 32px; }
    }
  </style>
</head>
<body>

<div class="hero">
    <h1>PPA-DUN <span>Draft Kit API</span></h1>
    <p>MLB player data API for your Draft Kit.</p>
  </div>

  <div class="container">
    <div class="tabs">
      <button class="tab active" onclick="showPanel('docs')">Documentation</button>
      <button class="tab" onclick="showPanel('keys')">API Keys</button>
      <button class="tab" onclick="showPanel('usage')">Usage</button>
    </div>

    <!-- Docs Panel -->
    <div id="panel-docs" class="panel active"></div>

    <!-- Keys Panel -->
    <div id="panel-keys" class="panel"></div>

    <!-- Usage Panel -->
    <div id="panel-usage" class="panel"></div>
  </div>

  <script>
    function showPanel(name) {
      document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
      document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
      document.getElementById('panel-' + name).classList.add('active');
      document.querySelectorAll('.tab').forEach(t => {
        if (t.textContent.toLowerCase().includes(name.substring(0, 3))) t.classList.add('active');
      });
    }
  </script>

</body>
</html>
