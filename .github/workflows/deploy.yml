name: Deploy

on:
  push:
    branches: [main]
    paths:
      - 'frontend/**'

env:
  GCP_ZONE: us-east1-b

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Deploy to VM
        run: |
          gcloud compute ssh ${{ secrets.API_INSTANCE_NAME }} \
            --zone=${{ env.GCP_ZONE }} \
            --command="cd /app/api && git pull origin main && \
                       cd /app/cl/api && sudo docker compose up --build -d fe"

  notify:
    needs: deploy
    if: always()
    uses: ./.github/workflows/discord-deploy-notify.yml
    with:
      status: ${{ needs.deploy.result }}
      service: API Frontend
    secrets:
      DISCORD_DEPLOY_WEBHOOK: ${{ secrets.DISCORD_DEPLOY_WEBHOOK }}
