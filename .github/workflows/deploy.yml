name: Deploy

on:
  push:
    branches: [main]
    paths:
      - 'frontend/**'

env:
  GCP_ZONE: us-east1-b

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Deploy to VM
        run: |
          gcloud compute ssh ${{ secrets.API_INSTANCE_NAME }} \
            --zone=${{ env.GCP_ZONE }} \
            --command="sudo mkdir -p /app/api /app/cl && \
                       if [ -d /app/api/.git ]; then cd /app/api && sudo git pull origin main; else sudo git clone https://github.com/${{ github.repository }}.git /app/api; fi && \
                       if [ -d /app/cl/.git ]; then cd /app/cl && sudo git pull origin main; else sudo git clone https://github.com/Ppa-Dun-project/PPA-DUN-cloud.git /app/cl; fi && \
                       cd /app/cl/api && sudo docker compose up --build -d fe"

  notify:
    needs: deploy
    if: always()
    uses: ./.github/workflows/discord-deploy-notify.yml
    with:
      status: ${{ needs.deploy.result }}
      service: API Frontend
    secrets:
      DISCORD_DEPLOY_WEBHOOK: ${{ secrets.DISCORD_DEPLOY_WEBHOOK }}
