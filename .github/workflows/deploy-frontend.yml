name: Deploy Frontend

on:
  push:
    branches: [main]
    paths:
      - 'frontend/**'

env:
  GCP_ZONE: us-east1-b

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Build
        working-directory: frontend
        env:
          VITE_GOOGLE_CLIENT_ID: ${{ secrets.VITE_GOOGLE_CLIENT_ID }}
          VITE_API_URL: ${{ secrets.VITE_API_URL }}
        run: npm run build

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Deploy to API Server
        run: |
          gcloud compute ssh ${{ secrets.API_INSTANCE_NAME }} \
            --zone=${{ env.GCP_ZONE }} \
            --command="sudo mkdir -p /app/api/frontend/dist && sudo chown -R \$(whoami) /app/api/frontend"
          gcloud compute scp --recurse frontend/dist/* \
            ${{ secrets.API_INSTANCE_NAME }}:/app/api/frontend/dist/ \
            --zone=${{ env.GCP_ZONE }}

  notify:
    needs: build-and-deploy
    if: always()
    uses: ./.github/workflows/discord-deploy-notify.yml
    with:
      status: ${{ needs.build-and-deploy.result }}
      service: API Frontend
    secrets:
      DISCORD_DEPLOY_WEBHOOK: ${{ secrets.DISCORD_DEPLOY_WEBHOOK }}
