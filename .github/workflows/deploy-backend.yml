name: Deploy Backend

on:
  push:
    branches: [main]
    paths:
      - 'api/**'
      - 'Dockerfile'

env:
  GCP_ZONE: us-east1-b
  IMAGE: us-east1-docker.pkg.dev/v1-mvp/api/api

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker us-east1-docker.pkg.dev --quiet

      - name: Build and push Docker image
        run: |
          docker build -t ${{ env.IMAGE }}:${{ github.sha }} -t ${{ env.IMAGE }}:latest .
          docker push ${{ env.IMAGE }}:${{ github.sha }}
          docker push ${{ env.IMAGE }}:latest

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Deploy to API Server
        run: |
          gcloud compute ssh ${{ secrets.API_INSTANCE_NAME }} \
            --zone=${{ env.GCP_ZONE }} \
            --command="sudo gcloud auth configure-docker us-east1-docker.pkg.dev --quiet && \
                       sudo docker pull ${{ env.IMAGE }}:latest && \
                       sudo git config --global --add safe.directory /app/cl && \
                       cd /app/cl && sudo git pull origin main && \
                       cd /app/cl/api && sudo docker compose up -d api"

  notify:
    needs: deploy
    if: always()
    uses: ./.github/workflows/discord-deploy-notify.yml
    with:
      status: ${{ needs.deploy.result }}
      service: API Backend
    secrets:
      DISCORD_DEPLOY_WEBHOOK: ${{ secrets.DISCORD_DEPLOY_WEBHOOK }}
